<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- BOOTSTRAP -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!--GOOGLE FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!--FIM GOOGLE FONTS-->
    <link rel="stylesheet" href="style.css">
    <title>Portfólio</title>
</head>
<body>
    <header>
        <div class="interface">
            <div class="logo">
                <a href="">
                    <img src="imagens/logo.png" alt="logo" width="200" height="200">
                </a>
            </div> <!--logo-->
            <nav class="menu-desktop">
                <ul>
                    <li><a href="">Início</a></li>
                    <li><a href="">Sobre</a></li>
                    <li><a href="">Projetos</a></li>
                </ul>
            </nav>
            <div class="contato">
                <a href="">
                    <button class="botão">Contato</button>
                </a>
            </div>
        </div> <!--interface-->
    </header>

    <main>
        <section class="topo-do-site">
            <div class="interface">
                <div class="flex">
                    <div class="txt-topo-site">
                        <h1>Olá, eu sou Monalysa.</h1>
                        <p>Estudante de Ciência da Computação</p>

                        <div class="contato">
                            <a href="https://www.linkedin.com/in/monalysasilva">
                                <button class="botão"><i class="bi bi-linkedin"></i> Conheça meu LinkedIn</button>
                            </a>
                        </div>
                    </div><!--txt-topo-site-->

                    <div class="img-topo-site">
                        <img src="imagens/foto.png" alt="Foto minha" width="400" height="300">
                    </div><!--img-topo-site-->
                </div><!--flex-->
            </div><!--interface-->
        </section><!--topo-do-site-->
        <section class="sobre">
            <div class="interface">
                <div class="flex">
                    <div class="img-sobre">
                        <img src="imagens/foto-sobre.jpeg" alt="Eu em uma apresentação"  width="300" height="400">
                    </div><!--img-sobre-->

                    <div class="txt-sobre">
                        <h2>Aprendendo...</h2>
                        <p>- Python</p>
                        <p>- HTML</p>
                        <p>- CSS</p>
                        <p>- JavaScript</p>
                        <p>- C++</p>
                        <p>- Arduino</p>
                    </div><!--txt-sobre-->
                </div><!--flex-->
            </div><!--interface-->
        </section><!--sobre-->
        <section class="projetos">
            <div class="interface">
                <h2 class = "titulo">Projetos que estou trabalhando.</h2>
                <div class="flex">
                    <div class="img-projetos" style="background-image: url(imagens/bitsy.png);"></div>
                    <div class="img-projetos"></div>
                    <div class="img-projetos"></div>
                </div><!-- flex -->
            </div><!-- interface -->
        </section><!-- projetos -->
    </main>
</body>
</html>
